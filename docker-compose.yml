services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: mentorship_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mentorship_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mentorship_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Short-lived Migrator Container
  migrator:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: mentorship_migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mentorship_db}
    env_file:
      - .env
    command: alembic upgrade head

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: mentorship_api
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mentorship_db}
      DEBUG: "True"
    ports:
      - "8000:8000"
    volumes:
      - ./services/api/src:/app/src
    env_file:
      - .env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
